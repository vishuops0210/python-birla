name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - uat

jobs:
  python-ci:
    uses: vishuops0210/shared-repo/.github/workflows/ci-python.yml@main
    with:
      # --- CORE SETTINGS ---
      python-version: '3.9'

      # --- GITLEAKS (SECRET SCAN) ---
      enable-gitleaks: false
      gitleaks-fetch-depth: '20'

      # --- UNIT TESTS ---
      enable-unit-tests: true
      install-command: |
        if [ ! -d ".venv" ]; then python -m venv .venv; fi
        source .venv/bin/activate
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      test-command: |
        source .venv/bin/activate
        pytest --cov --cov-report=xml:coverage.xml --cov-report=term-missing --junitxml=test-results.xml

      # --- SONARQUBE (SAST) ---
      enable-sonarqube: true
      sonar-project-key: 'bajaj-demo-python'
      sonar-exclusions: 'venv/**,__pycache__/**,tests/**,.github/**'
      sonar-args: '-Dsonar.projectName="Bajaj Demo Python App" -Dsonar.tests=tests -Dsonar.python.coverage.reportPaths=coverage.xml -Dsonar.python.xunit.reportPath=test-results.xml -Dsonar.sourceEncoding=UTF-8'

      # --- DOCKER BUILD & PUSH ---
      enable-docker-build: true
      enable-image-size-check: true
      docker-repository: 'demo-python-app'
      docker-tag: ${{ github.sha }}
      max-image-size-mb: '500'
    secrets: inherit