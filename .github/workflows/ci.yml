name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:

  ci-pipeline:
    uses: vishuops0210/shared-repo/.github/workflows/python-ci.yml@main
    with:
    
      python-version: '3.9'
      sonar-project-key: 'bajaj-python'
      docker-repository: 'demo-python-app'
      docker-tag: ${{ github.sha }}
      max-image-size-mb: '500'
      sonar-exclusions: 'venv/**,__pycache__/**,tests/**,.github/**'
      sonar-args: '-Dsonar.projectName="Bajaj Python App" -Dsonar.tests=tests -Dsonar.python.coverage.reportPaths=coverage.xml -Dsonar.python.xunit.reportPath=test-results.xml -Dsonar.sourceEncoding=UTF-8'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
