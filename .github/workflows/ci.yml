name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-pipeline:
    uses: vishuops0210/shared-repo/.github/workflows/python-ci.yml@main
    with:
      python-version: '3.9'
      sonar-project-key: 'bajaj-python'
      docker-repository: 'demo-python-app'
      docker-tag: ${{ github.sha }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
