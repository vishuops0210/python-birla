name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Unit Tests, Coverage & SonarQube SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Secret Scanning ──
      - name: Gitleaks Scan
        uses: vishuops0210/shared-repo/.github/actions/gitleaks-scan@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup & Test
        uses: vishuops0210/shared-repo/.github/actions/python-test@main
        with:
          python-version: '3.9'
          requirements-file: 'requirements-dev.txt'

      # ── Dependency Scanning (SCA) ──
      - name: Trivy FS Scan
        uses: vishuops0210/shared-repo/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          exit-code: '0'

      # ── Security & Quality Gate (SAST) ──
      - name: SonarQube Scan
        uses: vishuops0210/shared-repo/.github/actions/sonarqube-scan@main
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-host-url: 'https://sonar.tyagi.fun'
          sonar-project-key: 'bajaj-python'
          sonar-project-name: 'Bajaj Python App'
          sonar-sources: '.'
          sonar-exclusions: 'venv/**,__pycache__/**,tests/**,.github/**'

  build-and-push:
    name: Build and Push Python to Docker Hub
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Docker Build & Push ──
      - name: Setup Docker Hub Login
        uses: vishuops0210/shared-repo/.github/actions/docker-login@main
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: vishuops0210/shared-repo/.github/actions/setup-docker@main

      - name: Build Docker Image
        uses: vishuops0210/shared-repo/.github/actions/docker-build@main
        with:
          repository: '${{ secrets.DOCKERHUB_USERNAME }}/demo-python-app'
          image-tag: ${{ github.sha }}

      # ── Container Vulnerability Scanning ──
      - name: Trivy Image Scan
        uses: vishuops0210/shared-repo/.github/actions/trivy-scan@main
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/demo-python-app:${{ github.sha }}'
          exit-code: '0'

      - name: Push Docker Image
        uses: vishuops0210/shared-repo/.github/actions/docker-push@main
        with:
          repository: '${{ secrets.DOCKERHUB_USERNAME }}/demo-python-app'
          image-tag: ${{ github.sha }}
